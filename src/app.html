  <!-- Structured Data (JSON-LD) — SoftwareApplication -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "LEXACTA",

      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "ARS",
        "description": "7 días gratis sin tarjeta de crédito",

      },
      "description": "Plataforma SaaS de gestión legal inteligente para abogados y estudios jurídicos en Argentina. Gestión de expedientes, vencimientos, escritos con IA y portal del cliente.",
      "screenshot": "https://lexacta.com.ar/og-image.jpg",
      "publisher": {
        "@type": "Organization",
        "name": "Brikzen",
        "url": "https://brikzen.ar",
        "logo": "https://lexacta.com.ar/logo.svg",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+54-9-11-7615-7868",
          "contactType": "sales",
          "areaServed": "AR",
          "availableLanguage": "Spanish"
        }
      }
    }
  </script>

  <!-- Structured Data (JSON-LD) — FAQPage for rich results -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Necesito ser experto en tecnología para usar LEXACTA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. La interfaz se aprende en 15 minutos. Tenemos videos cortos y soporte en lenguaje de abogados, no de técnicos."
          }
        },
        {
          "@type": "Question",
          "name": "¿Los plazos que calcula LEXACTA están actualizados?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. La calculadora de indemnizaciones y el gestor de plazos se actualizan con jurisprudencia local. Además verificamos feriados judiciales automáticamente."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo probarlo antes de pagar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Tenés 7 días gratis sin compromiso y una garantía de satisfacción de 30 días."
          }
        },
        {
          "@type": "Question",
          "name": "¿Es segura la información de mis clientes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Toda la información está encriptada. El portal del cliente usa acceso seguro y los mensajes son encriptados de extremo a extremo."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo cancelar en cualquier momento?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Sin permanencia mínima, sin penalidades. Podés cancelar cuando quieras desde el panel."
          }
        },
        {
          "@type": "Question",
          "name": "¿Funciona para todas las provincias argentinas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El módulo laboral y penal funcionan a nivel nacional. Las integraciones con sistemas judiciales cubren BA, CABA y Córdoba en la Fase 1, con más provincias en camino."
          }
        },
        {
          "@type": "Question",
          "name": "¿La IA reemplaza al abogado?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No, la IA es tu asistente. Lexacta propone borradores y sugiere estrategias, pero el control final y el criterio profesional siempre son tuyos."
          }
        },
        {
          "@type": "Question",
          "name": "¿Sirve para estudios pequeños o solo es 'Enterprise'?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Está pensada tanto para abogados independientes como para estudios jurídicos medianos y grandes. Se adapta perfectamente a tu volumen de casos y clientes."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo se valida lo que genera la IA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Lexacta utiliza IA auditable. Cada sugerencia o borrador tiene trazabilidad directa a los documentos y fojas originales para que puedas revisar rápidamente."
          }
        }
      ]
    }
  </script>
